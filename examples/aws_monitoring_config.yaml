# objectid: <EXISTING_CONFIG_ID_IF_UPDATING>
scope: integration-aws
value:
  enabled: false
  description: my-aws-monitoring-config
  # The version must match a version of com.dynatrace.extension.da-aws available
  # in the tenant. Use 'dtctl get extension com.dynatrace.extension.da-aws' to
  # list available versions.
  version: 1.0.0
  activationContext: DATA_ACQUISITION
  aws:
    # The "deployment region" is the AWS region used by the extension to host
    # its workload (typically the same as the first monitored region).
    deploymentRegion: us-east-1

    deploymentScope: SINGLE_ACCOUNT
    deploymentMode: AUTOMATED
    configurationMode: QUICK_START

    credentials:
      - enabled: false
        description: Connection-Description
        # The AWS connection objectId (from 'dtctl get aws connections')
        connectionId: <PASTE_CONNECTION_ID_HERE>
        # 12-digit AWS account ID (extracted from the role ARN)
        accountId: "123456789012"

    # Comma-separated AWS namespaces to restrict ingestion (empty = all
    # namespaces controlled by the selected feature sets).
    # Custom metrics can be added here for CloudWatch namespaces not covered by
    # built-in feature sets. Each entry defines a namespace and one or more
    # metrics to ingest.
    namespaces: []
    # namespaces:
    #   - namespace: AWS/GroundStation        # CloudWatch namespace
    #     autoDiscoveryEnabled: false
    #     metrics:
    #       - name: AzimuthAngle              # CloudWatch metric name
    #         unit: Count                     # Unit (Count, Bytes, Seconds, Percent, etc.)
    #         dimensions:                     # CloudWatch dimensions to collect
    #           - SatelliteId
    #         aggregations:                   # Statistics to retrieve
    #           - Sum
    #           - SampleCount
    #         type: CUSTOM_AWS                # CUSTOM_AWS = standard CW metric
    #   - namespace: DynatraceSFM             # custom/non-standard namespace
    #     autoDiscoveryEnabled: false
    #     metrics:
    #       - name: IngestHealth
    #         unit: Count
    #         dimensions:
    #           - tenantUuid
    #         aggregations:
    #           - SampleCount
    #           - Sum
    #           - Maximum
    #           - Minimum
    #         type: CUSTOM                    # CUSTOM = non-standard namespace

    smartscapeConfiguration:
      enabled: true

    metricsConfiguration:
      enabled: true
      regions:
        - us-east-1
        - eu-central-1

    cloudWatchLogsConfiguration:
      enabled: false
      regions: []

    regionFiltering:
      - us-east-1
      - eu-central-1

    # Tag filtering allows you to include/exclude resources based on tags.
    tagFiltering:
      - key: environment
        value: production
        condition: INCLUDE
      - key: owner
        value: temp-team
        condition: EXCLUDE

    # Tag enrichment promotes selected AWS tag keys onto Dynatrace entities so
    # that the tag values become queryable as entity properties. Uncomment and
    # adjust the keys below to opt in.
    tagEnrichment: []
    # tagEnrichment:
    #   - owner
    #   - cost-center
    #   - environment

    # Dynatrace label enrichment maps Dynatrace labels to literal values or AWS
    # tag keys. These labels appear on ingested entities and metrics.
    # dtLabelsEnrichment:
    #   dt.security_context:
    #     literal: my-app                    # literal: fixed string value
    #   dt.cost.costcenter:
    #     tagKey: cost-center                # tagKey: value copied from AWS tag
    #   dt.cost.product:
    #     tagKey: product

  # ---------------------------------------------------------------------------
  # Feature sets — enable / disable groups of CloudWatch metrics per AWS
  # service. Each AWS namespace defined in the extension typically exposes:
  #   *_essential       — production-grade default metric set
  #   *_autodiscovery   — entity discovery metrics (lightweight)
  # Use 'dtctl get aws monitoring-feature-sets' to list the live values from
  # the extension version you target. The list below mirrors the static
  # catalogue shipped with com.dynatrace.extension.da-aws v1.0.0; uncomment
  # the ones you need.
  # ---------------------------------------------------------------------------
  featureSets:
    - EC2_essential
    - RDS_essential
    - S3_essential
    - Lambda_essential
    - DynamoDB_essential
